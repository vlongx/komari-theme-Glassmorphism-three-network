name: Release On Version Bump

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: release-on-version-bump-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install dependencies
        run: bun install

      - name: Detect theme version
        id: version
        env:
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          node <<'NODE' >> "$GITHUB_OUTPUT"
          const { execFileSync } = require('node:child_process')
          const { readFileSync } = require('node:fs')

          const zeroSha = '0000000000000000000000000000000000000000'
          const beforeSha = process.env.BEFORE_SHA
          const versionRe = /^\d+\.\d+\.\d+(?:[-+][0-9A-Z.-]+)?$/i

          function readJson(filePath) {
            return JSON.parse(readFileSync(filePath, 'utf8'))
          }

          function readJsonAtRevision(revision, filePath) {
            const content = execFileSync('git', ['show', `${revision}:${filePath}`], { encoding: 'utf8' })
            return JSON.parse(content)
          }

          const themeJson = readJson('komari-theme.json')
          const currentVersion = themeJson.version

          if (typeof currentVersion !== 'string' || !versionRe.test(currentVersion)) {
            console.error(`Invalid komari-theme.json version: ${currentVersion}`)
            process.exit(1)
          }

          let previousVersion = ''
          let versionChanged = true

          if (beforeSha && beforeSha !== zeroSha) {
            try {
              previousVersion = readJsonAtRevision(beforeSha, 'komari-theme.json').version ?? ''
              versionChanged = previousVersion !== currentVersion
            }
            catch {
              versionChanged = true
            }
          }

          console.log(`current_version=${currentVersion}`)
          console.log(`previous_version=${previousVersion}`)
          console.log(`version_changed=${versionChanged}`)
          console.log(`release_tag=v${currentVersion}`)
          NODE

      - name: Check release tag state
        id: tag
        env:
          RELEASE_TAG: ${{ steps.version.outputs.release_tag }}
          CURRENT_SHA: ${{ github.sha }}
        run: |
          git fetch --force --tags

          if git rev-parse "refs/tags/${RELEASE_TAG}" >/dev/null 2>&1; then
            tag_sha="$(git rev-list -n 1 "${RELEASE_TAG}")"
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "sha=${tag_sha}" >> "$GITHUB_OUTPUT"
            if [ "${tag_sha}" = "${CURRENT_SHA}" ]; then
              echo "current=true" >> "$GITHUB_OUTPUT"
            else
              echo "current=false" >> "$GITHUB_OUTPUT"
              echo "Tag ${RELEASE_TAG} already exists on ${tag_sha}, not on ${CURRENT_SHA}. Assuming the release was handled manually and skipping automation."
            fi
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "current=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip when version is unchanged and release tag exists
        if: steps.version.outputs.version_changed != 'true' && steps.tag.outputs.exists == 'true'
        run: |
          echo "komari-theme.json version has not changed and ${{ steps.version.outputs.release_tag }} already exists. Skipping release."

      - name: Build project
        if: steps.version.outputs.version_changed == 'true' || steps.tag.outputs.exists == 'false'
        run: bun run build

      - name: Create and push release tag
        if: (steps.version.outputs.version_changed == 'true' || steps.tag.outputs.exists == 'false') && steps.tag.outputs.exists == 'false'
        env:
          RELEASE_TAG: ${{ steps.version.outputs.release_tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${RELEASE_TAG}" -m "Release ${RELEASE_TAG}"
          git push origin "${RELEASE_TAG}"

      - name: Skip when release tag was handled manually
        if: (steps.version.outputs.version_changed == 'true' || steps.tag.outputs.exists == 'false') && steps.tag.outputs.exists == 'true' && steps.tag.outputs.current == 'false'
        run: |
          echo "${{ steps.version.outputs.release_tag }} already exists on ${{ steps.tag.outputs.sha }}. Skipping release creation."

      - name: Create or update GitHub release
        if: (steps.version.outputs.version_changed == 'true' || steps.tag.outputs.exists == 'false') && (steps.tag.outputs.exists == 'false' || steps.tag.outputs.current == 'true')
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.release_tag }}
          name: ${{ steps.version.outputs.release_tag }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          overwrite_files: true
          fail_on_unmatched_files: true
          files: |
            komari-theme-Glassmorphism-build*.zip
